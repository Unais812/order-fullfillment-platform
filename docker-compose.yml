services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: app
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-dev-secret
      ORDER_SERVICE_URL: http://order-service:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      SHIPPING_SERVICE_URL: http://shipping-service:8085
      DASHBOARD_SERVICE_URL: http://dashboard-api:8086
    depends_on:
      - redis

  order-service:
    build: ./services/order-service
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://app:localdev@postgres:5432/orders?sslmode=disable
      SQS_QUEUE_URL: http://localstack:4566/000000000000/order-events
    depends_on:
      - postgres

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://app:localdev@postgres:5432/orders?sslmode=disable
    depends_on:
      - postgres

  payment-service:
    build: ./services/payment-service
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: postgres://app:localdev@postgres:5432/orders?sslmode=disable
      SQS_QUEUE_URL: http://localstack:4566/000000000000/order-events
    depends_on:
      - postgres

  notification-service:
    build: ./services/notification-service
    ports:
      - "8084:8084"
    environment:
      DATABASE_URL: postgres://app:localdev@postgres:5432/orders?sslmode=disable
    depends_on:
      - postgres

  shipping-service:
    build: ./services/shipping-service
    ports:
      - "8085:8085"
    environment:
      DATABASE_URL: postgres://app:localdev@postgres:5432/orders?sslmode=disable
      SQS_QUEUE_URL: http://localstack:4566/000000000000/order-events
    depends_on:
      - postgres

  worker:
    build: ./services/worker
    environment:
      SQS_QUEUE_URL: http://localstack:4566/000000000000/order-events
      ORDER_SERVICE_URL: http://order-service:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
      NOTIFICATION_SERVICE_URL: http://notification-service:8084
      SHIPPING_SERVICE_URL: http://shipping-service:8085
    depends_on:
      - order-service
      - inventory-service
      - payment-service
      - notification-service
      - shipping-service

  scheduler:
    build: ./services/scheduler
    environment:
      DATABASE_URL: postgres://app:localdev@postgres:5432/orders?sslmode=disable
    depends_on:
      - postgres

  dashboard-api:
    build: ./services/dashboard-api
    ports:
      - "8086:8086"
    environment:
      DATABASE_URL: postgres://app:localdev@postgres:5432/orders?sslmode=disable
    depends_on:
      - postgres

  localstack:
    image: localstack/localstack
    ports:
    - "4566:4566"
    environment:
    - SERVICES=sqs

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
  
volumes:
  pgdata:
  prometheus-data:
  grafana-data: